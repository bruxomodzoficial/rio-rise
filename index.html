<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desbloquear Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:360px;
  background:#181818;
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.9);
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  font-size:22px;
  color:#ff0000;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#aaa;
  margin-bottom:25px;
}

/* BARRA */
#progress{
  height:6px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

#bar{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  transition:.5s;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,.5);
}

.subscribe{background:#ff0000;}
.secondary{background:#ff4444;}
.like{background:#0099ff;}
.comment{background:#00cc66;color:#000;}
.whatsapp{background:#25D366;color:#000;}

.done{
  background:#22c55e !important;
  animation:pop .3s ease;
}

@keyframes pop{
  from{transform:scale(0.9)}
  to{transform:scale(1)}
}

/* LIBERADO */
#liberado{
  display:none;
  margin-top:20px;
  animation:fade 0.8s ease;
}

#liberado a{
  display:inline-block;
  background:linear-gradient(90deg,#ffd000,#ffea00);
  color:#000;
  padding:14px 20px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
  transition:.3s;
}

#liberado a:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
  <h1>🔒 Desbloquear Conteúdo</h1>
  <p>Complete todas as ações abaixo</p>

  <div id="progress"><div id="bar"></div></div>

  <!-- CANAIS -->
  <a id="b1" class="btn subscribe" href="https://www.youtube.com/@isacmodstv" target="_blank" onclick="marcar('b1')">
    📺 Canal Principal
  </a>

  <a id="b2" class="btn secondary" href="https://www.youtube.com/@bruxomodzofc" target="_blank" onclick="marcar('b2')">
    📺 Canal Secundário
  </a>

  <!-- VÍDEO -->
  <a id="b3" class="btn like" href="https://youtu.be/Bc7--5-dfpk?si=FEWE6S08WXnmNc7R" target="_blank" onclick="marcar('b3')">
    👍 Curtir Vídeo
  </a>

  <a id="b4" class="btn comment" href="https://youtu.be/Bc7--5-dfpk?si=FEWE6S08WXnmNc7R" target="_blank" onclick="marcar('b4')">
    💬 Comentar Vídeo
  </a>

  <!-- WHATSAPP -->
  <a id="b5" class="btn whatsapp" href="https://chat.whatsapp.com/Bye9CWnyog5CggS0y6RxXA?mode=gi_t" target="_blank" onclick="marcar('b5')">
    🟢 Entrar no Grupo
  </a>

  <!-- LIBERAÇÃO -->
  <div id="liberado">
    <p>✅ Acesso liberado com sucesso</p>
    <a href="https://mega.nz/file/86BwFIzS#7vEKUAAJ1916OfhRdbAPHZ-kT9-8-vuVPh7sAHCqYGM" target="_blank">
      🚀 ACESSAR AGORA
    </a>
  </div>
</div>

<script>
let total = 0;

function atualizar(){
  document.getElementById('bar').style.width = (total*20)+'%';

  if(total === 5){
    setTimeout(()=>{
      document.getElementById('liberado').style.display = 'block';
    }, 600);
  }
}

function marcar(id){
  const el = document.getElementById(id);

  if(!el.classList.contains('done')){
    total++;
    el.classList.add('done');
    atualizar();
  }
}
</script>

</body>
</html>
